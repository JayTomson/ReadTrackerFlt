name: rtk
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.2
  image_gallery_saver_plus: ^4.0.1
  share_plus: ^10.0.0
  file_picker: ^8.0.0

# Жесткое ограничение версий внутренних плагинов Google
# Это не позволит Gradle запрашивать Android SDK 36
dependency_overrides:
  flutter_plugin_android_lifecycle: 2.0.22

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true